<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>splitflap</title>

    <!-- Open Graph / X (Twitter) card -->
    <meta property="og:title" content="splitflap" />
    <meta property="og:description" content="A split-flap display you can type on. Built with Go + WebAssembly." />
    <meta property="og:url" content="https://quartermeat.github.io/splitflap" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="splitflap" />
    <meta name="twitter:description" content="A split-flap display you can type on. Built with Go + WebAssembly." />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        /* Hidden input to trigger mobile keyboard */
        #kb {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            border: none;
            background: transparent;
            color: transparent;
            font-size: 16px; /* prevents iOS zoom on focus */
        }
    </style>
</head>
<body>
    <input id="kb" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />

    <script src="wasm_exec.js"></script>
    <script>
        // Patch WebGL to preserve drawing buffer so screenshots work.
        const origGetContext = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function(type, attrs) {
            if (type === 'webgl' || type === 'webgl2') {
                attrs = Object.assign({}, attrs, { preserveDrawingBuffer: true });
            }
            return origGetContext.call(this, type, attrs);
        };

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("splitflap.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
        });

        // Mobile keyboard bridge.
        // Go calls splitflapFocusKeyboard() when user taps the input area.
        // The hidden input fires input/keydown events that Go reads via splitflapGetKbValue().
        const kb = document.getElementById('kb');
        let kbValue = '';
        let kbLastKey = '';

        window.splitflapFocusKeyboard = function() {
            kb.style.pointerEvents = 'auto';
            kb.value = kbValue;
            kb.focus();
            kb.style.pointerEvents = 'none';
        };

        window.splitflapGetKbValue = function() {
            return kbValue;
        };

        window.splitflapClearKb = function() {
            kbValue = '';
            kb.value = '';
        };

        window.splitflapGetLastKey = function() {
            const k = kbLastKey;
            kbLastKey = '';
            return k;
        };

        kb.addEventListener('input', () => {
            kbValue = kb.value.toUpperCase().replace(/[^A-Z0-9 .,!'?:\/\-\n]/g, '');
            kb.value = kbValue;
        });

        kb.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                kbLastKey = e.shiftKey ? 'shift-enter' : 'enter';
            } else if (e.key === 'Backspace') {
                kbLastKey = 'backspace';
            }
        });

        // Tap anywhere on canvas focuses the keyboard on mobile.
        document.addEventListener('touchstart', () => {
            if (typeof splitflapFocusKeyboard === 'function') {
                splitflapFocusKeyboard();
            }
        }, { passive: true });

        // F2 — screenshot the canvas.
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F2') {
                e.preventDefault();
                const canvases = Array.from(document.querySelectorAll('canvas'));
                if (!canvases.length) return;
                const canvas = canvases.reduce((a, b) =>
                    a.width * a.height >= b.width * b.height ? a : b
                );
                const out = document.createElement('canvas');
                out.width = canvas.width;
                out.height = canvas.height;
                out.getContext('2d').drawImage(canvas, 0, 0);
                const link = document.createElement('a');
                link.download = 'splitflap-' + Date.now() + '.png';
                link.href = out.toDataURL('image/png');
                link.click();
            }
        });
    </script>
</body>
</html>
